<!DOCTYPE html>
<html>

<head>
	<meta charset="ISO-8859-1">
	<title>To-Do List App</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- Page Loader -->
	<div id="pageLoader" class="page-loader">
		<div class="spinner"></div>
	</div>
	
	<div class="container" id="container" style="display: none;">
		<!--SIGN UP FORM-->
		<div class="form-container sign-up-container">
			<form>
				<h1>Create Account</h1>
					<div id="signUpError" class="form-error"></div>
				<span>or use your email for registration</span>
				<div class="input-group">
					<input type="text" id="signUpName" placeholder="Name" />
				</div>
				<div class="input-group">
					<input type="email" id="signUpEmail" placeholder="Email"/>
				</div>
				<div class="input-group password-row">
					<input type="password" placeholder="Password" id="signUpPass"/>
					<i class="eye-icon" onclick="togglePassword('signUpPass', this)">
						<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
					</i>
				</div>
				<button type="button" class="main-btn" onclick="handleSignup()">Sign Up</button>
			</form>
		</div>

		<!--SIGN IN FORM-->
		<div class="form-container sign-in-container">
			<form >
				<h1>Sign in</h1>
				    <div id="signInError" class="form-error"></div>
				<span>to stay connected</span>
				<div class="input-group">
					<input type="email" placeholder="Email" id="signInEmail"/>
					<small class="error-text" id="emailError"></small>
				</div>
				<div class="input-group password-container" id="inputPassword">
					<input type="password" placeholder="Password" id="signInPass"/>
					<small class="error-text" id="passError"></small>
					<i class="eye-icon" onclick="togglePassword('signInPass', this)">
						<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
					</i>
				</div>				
				<a href="#" class="forgot">Forgot your password?</a>
				<button type="button" class="main-btn" onclick="handleLogin()">Sign In</button>
			</form>
		</div>

		 <!-- Overlay Panel -->
		<div class="overlay-container">
			<div class="overlay">
				<div class="overlay-panel overlay-left">
					<h1>Welcome Back!</h1>
					<p>Already have an account? Sign in here.</p>
					<button class="ghost-btn" id="signIn">Sign In</button>
				</div>
				<div class="overlay-panel overlay-right">
					<h1>Hello, Friend!</h1>
					<p>Don't have an account yet? Join us today.</p>
					<button class="ghost-btn" id="signUp">Sign Up</button>
				</div>
			</div>
		</div>
	</div>


	<!-- Main App Container (Hiiden By Default)-->
	<div id="main-app" class="todo-container" style="display: none;">
		<div class="todo-app">
			<div class="header-action">
				<div class="todo-title">
					<h2>To-Do-List <img src="images/icon.png"></h2>
					<div class="todo-meta">
						<span class="task-count">0 tasks</span>
					</div>
				</div>
				<button onclick="handleLogout()" class="logout-btn">Logout</button>
			</div>
			<div class="row">
				<input type="text" id="input-box" placeholder="Add Your Task">
				<button id="addTaskBtn" type="button" onclick="addTask()" disabled>Add</button>
			</div>

			<!-- Delete Multiple Records -->
			<div class="bulk-actions">
				<button id="toggleSelectBtn" disabled>Select Multiple</button>
				<button id="deleteSelectedBtn" style="display:none;">Delete (0)</button>
				<button id="cancelSelectBtn" style="display:none;">Cancel</button>
				<button id="selectAllBtn" style="display:none;">Select All</button>
				<button id="deselectAllBtn" style="display:none;">Deselect All</button>
			</div>
			<ul id="list-container"></ul>
		</div>
	</div>

	<!-- Delete Modal -->
	<div id="deleteModal" class="modal">
		<div class="modal-content">
			<p><b>Are you sure you want to delete this task?</b></p>
			<div class="modal-actions">
				<button id="confirmDelete" class="yes-btn">Yes</button>
				<button id="cancelDelete" class="no-btn">No</button>
			</div>
		</div>
	</div>

	<!-- Edit Modal -->
	<div id="editModal" class="modal">
		<div class="edit-content">
			<h3>Edit Task</h3>
			<textarea id="editInput" class="edit-input"></textarea>
			<div class="edit-actions">
				<button id="saveEdit" class="save-btn">Save</button>
				<button id="cancelEdit" class="cancel-btn">Cancel</button>
			</div>
		</div>
	</div>
	<script src="script.js"></script>
</body>

</html>
